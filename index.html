<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Palette Generator — Professional Color System | QuickUtils</title>
    <meta name="description" content="Generate harmonious color palettes, check WCAG contrast, simulate color blindness, and export to CSS/Tailwind.">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<nav class="navbar"><div class="container nav-inner"><a href="https://quickutils.top" class="brand">🎨 Color Palette</a><div class="nav-links"><button id="themeBtn" class="theme-btn">🌙</button></div></div></nav>
<main class="container" style="margin-top:1rem">
    <div class="hero glass-card text-center" style="margin-bottom:1.5rem"><h1 class="gradient-text">Color Palette Generator</h1><p class="text-muted">Create, analyze, and export professional color systems</p></div>
    <div class="app-grid">
        <section class="glass-card"><h3>🎯 Generator</h3>
            <div class="gen-controls">
                <label>Base Color <input type="color" id="baseColor" value="#6366f1"></label>
                <label>Harmony <select id="harmonyType"><option value="complementary">Complementary</option><option value="triadic">Triadic</option><option value="analogous">Analogous</option><option value="split">Split-Complementary</option><option value="tetradic">Tetradic</option><option value="monochromatic">Monochromatic</option></select></label>
                <button class="btn btn-primary w-full" id="generateBtn">Generate Palette</button>
                <button class="btn btn-secondary w-full" id="randomBtn">🎲 Random</button>
            </div>
            <div id="paletteDisplay" class="palette-display"></div>
        </section>
        <section class="glass-card"><h3>🔍 Contrast Checker</h3>
            <div class="contrast-row"><label>Foreground <input type="color" id="fgColor" value="#ffffff"></label><label>Background <input type="color" id="bgColor" value="#1e1e28"></label></div>
            <div id="contrastPreview" class="contrast-preview"><span>Sample Text</span></div>
            <div id="contrastResult" class="contrast-result"></div>
        </section>
        <section class="glass-card"><h3>👁 Color Blindness Sim</h3>
            <div id="blindnessDisplay" class="blindness-grid"></div>
        </section>
        <section class="glass-card"><h3>📋 Export</h3>
            <div class="export-tabs"><button class="btn btn-sm active" data-tab="css">CSS</button><button class="btn btn-sm" data-tab="tailwind">Tailwind</button><button class="btn btn-sm" data-tab="scss">SCSS</button></div>
            <textarea id="exportOutput" class="export-output" readonly></textarea>
            <button class="btn btn-primary btn-sm w-full" id="copyExportBtn">📋 Copy</button>
        </section>
        <section class="glass-card"><h3>🖼 Extract from Image</h3>
            <input type="file" id="imageInput" accept="image/*" style="margin-bottom:0.5rem">
            <canvas id="imgCanvas" width="300" height="200" style="display:none"></canvas>
            <div id="extractedPalette" class="palette-display"></div>
        </section>
        <section class="glass-card"><h3>⭐ Saved Palettes</h3>
            <div id="savedPalettes"></div>
            <button class="btn btn-secondary btn-sm w-full" id="savePaletteBtn">💾 Save Current</button>
        </section>
    </div>
</main>
<script src="script.js"></script>
</body></html>
